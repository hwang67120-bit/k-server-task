services:
  mysql:
    image: 'mysql:8.4'
    environment:
      - 'MYSQL_DATABASE=mydatabase'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3306'
    volumes:
      - 'mysql-data-84:/var/lib/mysql'
  redis:
    image: 'redis:7.4'
    ports:
      - '6379'

volumes:
  mysql-data-84:
